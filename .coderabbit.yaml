# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: |
  Be direct, technical, and thorough. Flag every potential issue.
  Do not sugarcoat feedback. Prioritize correctness, security,
  and performance. This is a Poseidon2 implementation and research
  tool in Rust — treat every PR as if it could ship to production.
early_access: true
enable_free_tier: true
reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  commit_status: true
  fail_commit_status: false
  poem: false
  collapse_walkthrough: false
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  changed_files_summary: true
  labeling_instructions: []
  # Exclude build artifacts, lock files, and generated code from review
  path_filters:
    - "!**/target/**"
    - "!**/*.lock"
    - "!**/generated/**"
    - "!**/__generated__/**"
    - "!**/*.wasm"
    - "!**/*.o"
    - "!**/*.so"
    - "!**/*.dylib"
  path_instructions:
    - path: "**/*.rs"
      instructions: |
        Review Rust code with extreme rigor. Check for:
        - Unsafe code blocks and justify necessity
        - Proper error handling (no unwrap in non-test code)
        - Memory safety and lifetime correctness
        - Clippy compliance at pedantic level
        - Dead code and unused imports
        - Performance: unnecessary allocations, clones, copies
        - Concurrency safety if applicable
        - Proper use of Result/Option types
        - Documentation on all public items
        - Cryptographic correctness for Poseidon2 hash operations
        - Constant-time operations where security-relevant
    - path: "**/*.toml"
      instructions: |
        Check dependency versions, features flags, and ensure
        no unnecessary dependencies. Verify workspace config.
    - path: "**/tests/**"
      instructions: |
        Ensure tests are comprehensive. Check edge cases,
        error paths, and boundary conditions. Flag missing
        test scenarios. Verify test vectors for cryptographic
        correctness.
    - path: "docs/**"
      instructions: |
        Check for accuracy, completeness, and consistency
        with the codebase. Flag stale or misleading docs.
    - path: "scripts/**"
      instructions: |
        Check for shellcheck compliance, proper error handling,
        and portability. Flag hardcoded paths.
    - path: "benchmarks/**"
      instructions: |
        Verify benchmark methodology is sound. Check for
        measurement bias and ensure reproducibility.
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    labels: []
    drafts: true
    base_branches: []
  # Finishing touches: auto-generate docstrings and unit tests
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
  tools:
    ast-grep:
      rule_dirs: []
      util_dirs: []
      essential_rules: true
      packages: []
    # Rust — primary language
    clippy:
      enabled: true
    # Shell scripts
    shellcheck:
      enabled: true
    # Markdown docs
    markdownlint:
      enabled: true
    # YAML config files
    yamllint:
      enabled: true
    # GitHub Actions workflows
    actionlint:
      enabled: true
    # GitHub CI checks
    github-checks:
      enabled: true
      timeout_ms: 90000
    # Security scanning
    gitleaks:
      enabled: true
    # Semgrep for additional security patterns
    semgrep:
      enabled: true
    # Disabled — not applicable to this project (Rust-only)
    ruff:
      enabled: false
    eslint:
      enabled: false
    biome:
      enabled: false
    hadolint:
      enabled: false
    swiftlint:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    checkov:
      enabled: false
    detekt:
      enabled: false
    flake8:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    cppcheck:
      enabled: false
    circleci:
      enabled: false
    sqlfluff:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: false
    languagetool:
      enabled: false
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  # Enable web search for library/API context during reviews
  web_search:
    enabled: true
  # Auto-detect CLAUDE.md, .cursorrules, AGENTS.md etc. as review criteria
  code_guidelines:
    enabled: true
    filePatterns: []
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  jira:
    usage: "auto"
    project_keys: []
  linear:
    usage: "auto"
    team_keys: []
  pull_requests:
    scope: "auto"
code_generation:
  docstrings:
    language: "en-US"
    path_instructions: []
  unit_tests:
    path_instructions: []
